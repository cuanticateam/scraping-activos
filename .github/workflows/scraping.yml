name: Scraping Activos Colombia

on:
  schedule:
    # 10 ejecuciones de 8am a 7pm hora Colombia (UTC-5)
    - cron: '0 13 * * *'    #  8:00 AM
    - cron: '15 14 * * *'   #  9:15 AM
    - cron: '30 15 * * *'   # 10:30 AM
    - cron: '45 16 * * *'   # 11:45 AM
    - cron: '0 18 * * *'    #  1:00 PM
    - cron: '15 19 * * *'   #  2:15 PM
    - cron: '30 20 * * *'   #  3:30 PM
    - cron: '45 21 * * *'   #  4:45 PM
    - cron: '0 23 * * *'    #  6:00 PM
    - cron: '0 0 * * *'     #  7:00 PM
  workflow_dispatch:         # Boton manual desde GitHub

jobs:
  scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install playwright gspread google-auth
          playwright install chromium --with-deps

      - name: Preparar datos anteriores
        run: |
          [ -f datos_anteriores.json ] || echo "{}" > datos_anteriores.json
          [ -f registro_cambios.json ] || echo "{}" > registro_cambios.json

      - name: Ejecutar scraping completo
        env:
          EMAIL_REMITENTE: ${{ secrets.EMAIL_REMITENTE }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scraping_cloud.py

      - name: Commit datos actualizados
        run: |
          git config user.name "Scraping Bot"
          git config user.email "bot@scraping.local"
          git add -f datos_anteriores.json registro_cambios.json
          git diff --staged --quiet || git commit -m "Actualizar datos $(date +%Y-%m-%d_%H:%M)"
          git push || echo "No se pudo hacer push"
