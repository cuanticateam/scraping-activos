name: Scraping Activos Colombia

on:
  schedule:
    # 2 veces al dia en horario Colombia (UTC-5)
    - cron: '0 13 * * *'    #  8:00 AM COL
    - cron: '0 23 * * *'    #  6:00 PM COL
  workflow_dispatch:         # Boton manual desde GitHub

jobs:
  scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install playwright gspread google-auth
          playwright install chromium --with-deps

      - name: Restaurar datos anteriores (cache)
        uses: actions/cache@v4
        with:
          path: |
            datos_anteriores.json
            registro_cambios.json
            ultimo_rescrape.txt
          key: scraping-data-${{ github.run_number }}
          restore-keys: |
            scraping-data-

      - name: Preparar datos si no hay cache
        run: |
          [ -f datos_anteriores.json ] || echo "{}" > datos_anteriores.json
          [ -f registro_cambios.json ] || echo "{}" > registro_cambios.json
          [ -f ultimo_rescrape.txt ] || echo "" > ultimo_rescrape.txt

      - name: Ejecutar scraping completo
        env:
          EMAIL_REMITENTE: ${{ secrets.EMAIL_REMITENTE }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scraping_cloud.py
